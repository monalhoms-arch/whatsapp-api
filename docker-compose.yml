version: '3.8'

services:
  whatsapp_api:
    build: .
    container_name: whatsapp_microservice
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      redis_cache:
        condition: service_healthy
      postgres_db:
        condition: service_healthy
    environment:
      # Database Connection
      - DATABASE_URL=postgresql://whatsapp_user:strongpassword@postgres_db:5432/whatsapp_data
      # Redis Connection
      - REDIS_HOST=redis_cache
      - REDIS_PORT=6379
      - REDIS_DB=0
      # Security (Overrides .env default)
      - API_SECRET_KEY=my_production_secret_key_123
      # Evolution API Configs
      - EVOLUTION_API_URL=http://your-evolution-api-domain:8080
      - EVOLUTION_API_TOKEN=global_token_from_evolution
      - EVOLUTION_INSTANCE_NAME=main_instance

  redis_cache:
    image: redis:alpine
    container_name: whatsapp_redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres_db:
    image: postgres:15-alpine
    container_name: whatsapp_postgres
    restart: always
    environment:
      POSTGRES_USER: whatsapp_user
      POSTGRES_PASSWORD: strongpassword
      POSTGRES_DB: whatsapp_data
    ports:
      - "5432:5432"
    volumes:
      - postgres_whatsapp_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U whatsapp_user -d whatsapp_data"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_whatsapp_data:
