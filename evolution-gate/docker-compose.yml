version: "3.8"

services:
  evolution_api:
    image: evoapicloud/evolution-api:latest
    container_name: evolution_api
    restart: always
    environment:
      - SERVER_URL=http://localhost:8080
      - AUTHENTICATION_TYPE=apikey
      - CORS_ORIGIN=*
      - CORS_METHODS=GET,POST,PUT,DELETE,PATCH
      - CORS_CREDENTIALS=true
      - AUTHENTICATION_API_KEY=my_evolution_token_123
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://rev:rev_pass@evolution_postgres:5432/evolution?sslmode=disable
      - REDIS_ENABLED=true
      - REDIS_URI=redis://evolution_redis:6379
      - DELAY_BEFORE_START=3000
      - LOG_LEVEL=INFO
    ports:
      - "8080:8080"
    depends_on:
      evolution_postgres:
        condition: service_healthy
      evolution_redis:
        condition: service_healthy
    networks:
      - evolution_net

  evolution_manager:
    image: evoapicloud/evolution-manager:latest
    container_name: evolution_manager
    restart: always
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/nginx.conf
      #command: >
      #sh -c "sed -i 's/must-revalidate//g' /etc/nginx/conf.d/nginx.conf && nginx -g 'daemon off;'"
    environment:
      - VITE_EVOLUTION_API_URL=http://127.0.0.1:8080
      - VITE_EVOLUTION_API_KEY=my_evolution_token_123
    ports:
      - "3000:80"
    depends_on:
      - evolution_api
    networks:
      - evolution_net

  evolution_postgres:
    image: postgres:15
    container_name: evolution_postgres
    restart: always
    environment:
      - POSTGRES_USER=rev
      - POSTGRES_PASSWORD=rev_pass
      - POSTGRES_DB=evolution
    volumes:
      - evolution_postgres_data:/var/lib/postgresql/data
    networks:
      - evolution_net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U rev -d evolution" ]
      interval: 10s
      timeout: 5s
      retries: 5

  evolution_redis:
    image: redis:7-alpine
    container_name: evolution_redis
    restart: always
    command: [ "redis-server", "--appendonly", "yes" ]
    volumes:
      - evolution_redis_data:/data
    networks:
      - evolution_net
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  evolution_net:
    driver: bridge

volumes:
  evolution_postgres_data:
  evolution_redis_data:
