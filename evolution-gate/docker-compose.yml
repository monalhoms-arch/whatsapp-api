version: "3.8"

services:
  evolution_api:
    # تم التغيير للنسخة الرسمية المستقرة
    image: evoapicloud/evolution-api:latest
    container_name: evolution_api
    restart: always
    # في Docker Compose نستخدم اسم الخدمة (postgres) بدلاً من 127.0.0.1
    environment:
      - SERVER_URL=http://localhost:8080
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=my_evolution_token_123
      
      # إعدادات قاعدة البيانات (الربط عبر الشبكة الداخلية)
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://rev:rev_pass@evolution_postgres:5432/evolution?sslmode=disable
      
      # إعدادات Redis
      - REDIS_ENABLED=true
      - REDIS_URI=redis://evolution_redis:6379
      
      # إعدادات إضافية لضمان استقرار المتصفح داخل الحاوية
      - DELAY_BEFORE_START=3000
      - LOG_LEVEL=INFO

    ports:
      - "8080:8080"
    
    depends_on:
      evolution_postgres:
        condition: service_healthy
      evolution_redis:
        condition: service_healthy
    
    networks:
      - evolution_net

  evolution_postgres:
    image: postgres:15
    container_name: evolution_postgres
    restart: always
    environment:
      - POSTGRES_USER=rev
      - POSTGRES_PASSWORD=rev_pass
      - POSTGRES_DB=evolution
    volumes:
      - evolution_postgres_data:/var/lib/postgresql/data
    networks:
      - evolution_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rev -d evolution"]
      interval: 10s
      timeout: 5s
      retries: 5

  evolution_redis:
    image: redis:7-alpine
    container_name: evolution_redis
    restart: always
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - evolution_redis_data:/data
    networks:
      - evolution_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  evolution_net:
    driver: bridge

volumes:
  evolution_postgres_data:
  evolution_redis_data: